<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCamargo — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/dashboard.css"/>
</head>
<body>

  <div class="color-bar"></div>

  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-name">FCamargo</div>
        <div class="sidebar-logo-sub">Confecção e Estamparia</div>
      </div>
      <a href="dashboard.html" class="nav-item active">
        <span class="nav-icon">📋</span> Pedidos
      </a>
      <a href="clientes.html" class="nav-item">
        <span class="nav-icon">👥</span> Clientes
      </a>
      <a href="relatorios.html" class="nav-item">
        <span class="nav-icon">📊</span> Relatórios
      </a>
      <a href="financeiro.html" class="nav-item" id="nav-config" hidden>
        <span class="nav-icon">💰</span> Financeiro
      </a>
      <div class="sidebar-bottom">
        <a href="index.html" class="nav-item">
          <span class="nav-icon">🚪</span> Sair
        </a>
      </div>
    </aside>

    <main class="main">

      <div class="page-header">
        <div>
          <div class="page-title">Pedidos</div>
          <div class="page-sub" id="data-atual"></div>
        </div>
        <button class="btn-new">+ Novo pedido</button>
      </div>

      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">Em produção</div>
          <div class="stat-value blue" id="stat-producao">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Próximos do prazo</div>
          <div class="stat-value red" id="stat-prazo">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Concluídos no mês</div>
          <div class="stat-value green" id="stat-concluidos">0</div>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active">Todos</button>
        <button class="filter-btn">Em produção</button>
        <button class="filter-btn">Concluídos</button>
      </div>

      <div class="table-card">
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Etapa atual</th>
              <th>Previsão</th>
              <th>Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tabela-body"></tbody>
        </table>
      </div>

    </main>
  </div>

  <!-- Modal: Novo Pedido -->
  <div class="modal-overlay" id="modal-novo-pedido">
    <div class="modal-form-container">

      <div class="modal-form-header">
        <div class="modal-form-title">Novo Pedido</div>
        <button class="modal-form-close" id="btn-fechar-modal">✕</button>
      </div>

      <div class="form-section">
        <div class="form-section-title">Dados do pedido</div>
        <div style="margin-bottom:16px">
          <label class="field-label">Cliente *</label>
          <div class="cliente-search-wrap" id="cliente-search-wrap">
            <input type="text" id="f-cliente-busca" class="field-input"
              placeholder="Buscar por nome, CPF ou CNPJ..." autocomplete="off"/>
            <div class="cliente-dropdown" id="cliente-dropdown" hidden></div>
          </div>
          <div class="cliente-selecionado" id="cliente-selecionado" hidden>
            <span class="cliente-sel-nome" id="cliente-sel-nome"></span>
            <button type="button" class="btn-trocar-cliente" id="btn-trocar-cliente">× Trocar</button>
          </div>
          <input type="hidden" id="f-clienteId"/>
        </div>
        <div>
          <label class="field-label" for="f-prazo">Previsão de entrega *</label>
          <input type="date" id="f-prazo" class="field-input"/>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Produtos</div>
        <div id="produtos-form-list"></div>
        <button class="btn-add-peca" id="btn-add-produto">+ Adicionar produto</button>
        <div class="pedido-total-footer" id="pedido-total-footer" hidden>
          <span class="pedido-total-label">Total do pedido</span>
          <span class="pedido-total-valor" id="pedido-total-valor">R$ 0,00</span>
        </div>
      </div>

      <div class="modal-form-actions">
        <button class="modal-btn modal-btn-cancel" id="btn-cancelar-novo">Cancelar</button>
        <button class="modal-btn modal-btn-confirm" id="btn-salvar-pedido">Salvar pedido</button>
      </div>

    </div>
  </div>

  <!-- Modal: Novo/Editar Cliente -->
  <div class="modal-overlay" id="modal-novo-cliente" style="z-index:200">
    <div class="modal-form-container">
      <div class="modal-form-header">
        <div class="modal-form-title" id="modal-cliente-titulo">Novo Cliente</div>
        <button class="modal-form-close" id="btn-fechar-modal-cliente">✕</button>
      </div>

      <div class="form-section">
        <div class="form-section-title">Tipo de pessoa</div>
        <div class="opcao-pills">
          <button type="button" class="opcao-pill active" id="tipo-pf">Pessoa Física</button>
          <button type="button" class="opcao-pill" id="tipo-pj">Pessoa Jurídica</button>
        </div>
      </div>

      <div id="campos-pf">
        <div class="form-row-2" style="margin-bottom:16px">
          <div>
            <label class="field-label">Nome completo *</label>
            <input type="text" id="fc-nome" class="field-input" placeholder="João da Silva"/>
          </div>
          <div>
            <label class="field-label">CPF *</label>
            <input type="text" id="fc-cpf" class="field-input" placeholder="000.000.000-00" maxlength="14"/>
          </div>
        </div>
      </div>

      <div id="campos-pj" hidden>
        <div class="form-row-2" style="margin-bottom:12px">
          <div>
            <label class="field-label">Razão Social *</label>
            <input type="text" id="fc-razao-social" class="field-input" placeholder="Empresa LTDA"/>
          </div>
          <div>
            <label class="field-label">CNPJ *</label>
            <input type="text" id="fc-cnpj" class="field-input" placeholder="00.000.000/0000-00" maxlength="18"/>
          </div>
        </div>
        <div class="form-row-2" style="margin-bottom:16px">
          <div>
            <label class="field-label">Nome Fantasia</label>
            <input type="text" id="fc-nome-fantasia" class="field-input"/>
          </div>
          <div>
            <label class="field-label">Inscrição Estadual</label>
            <input type="text" id="fc-inscricao-estadual" class="field-input"/>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Contato</div>
        <div class="form-row-2">
          <div>
            <label class="field-label">Telefone *</label>
            <input type="text" id="fc-telefone" class="field-input" placeholder="(11) 99999-9999"/>
          </div>
          <div>
            <label class="field-label">Email</label>
            <input type="email" id="fc-email" class="field-input" placeholder="email@exemplo.com"/>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Endereço</div>
        <div class="form-row-2" style="margin-bottom:12px">
          <div>
            <label class="field-label">CEP *</label>
            <input type="text" id="fc-cep" class="field-input" placeholder="00000-000" maxlength="9"/>
          </div>
          <div>
            <label class="field-label">Número *</label>
            <input type="text" id="fc-numero" class="field-input" placeholder="123"/>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <label class="field-label">Logradouro *</label>
          <input type="text" id="fc-logradouro" class="field-input"/>
        </div>
        <div class="form-row-2" style="margin-bottom:12px">
          <div>
            <label class="field-label">Bairro *</label>
            <input type="text" id="fc-bairro" class="field-input"/>
          </div>
          <div>
            <label class="field-label">Complemento</label>
            <input type="text" id="fc-complemento" class="field-input" placeholder="Apto, Sala..."/>
          </div>
        </div>
        <div class="form-row-2">
          <div>
            <label class="field-label">Município *</label>
            <input type="text" id="fc-municipio" class="field-input"/>
          </div>
          <div>
            <label class="field-label">UF *</label>
            <select id="fc-uf" class="field-input campo-select">
              <option value="">Selecione</option>
              <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
              <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
              <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
              <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
              <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
              <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
              <option>SP</option><option>SE</option><option>TO</option>
            </select>
          </div>
        </div>
      </div>

      <div class="modal-form-actions">
        <button class="modal-btn modal-btn-cancel" id="btn-cancelar-cliente">Cancelar</button>
        <button class="modal-btn modal-btn-confirm" id="btn-salvar-cliente">Salvar cliente</button>
      </div>
    </div>
  </div>

  <script src="/assets/js/config.js"></script>
  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/modal-cliente.js"></script>
  <script src="/assets/js/produto-form.js"></script>
  <script src="/assets/js/dashboard.js"></script>

</body>
</html>
