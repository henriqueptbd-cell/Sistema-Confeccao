<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FCamargo — Acesso Interno</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/assets/css/main.css"/>
  <link rel="stylesheet" href="/assets/css/login.css"/>
</head>
<body>

  <div class="color-bar"></div>

  <div class="login-box">
    <div class="logo-area">
      <div class="logo-name">FCamargo</div>
      <div class="logo-sub">Confecção e Estamparia</div>
      <div class="divider"></div>
    </div>

    <h2>Acesso interno</h2>
    <p class="subtitle">Área restrita para administradores e funcionárias.</p>

    <div class="form-group">
      <input type="email" id="email" placeholder=" " autocomplete="off"/>
      <label for="email">E-mail</label>
    </div>

    <div class="form-group">
      <input type="password" id="senha" placeholder=" "/>
      <label for="senha">Senha</label>
    </div>

    <button class="btn" id="btn-entrar">Entrar</button>

    <a href="consulta.html" class="back-link">← Voltar para <span>consulta de pedidos</span></a>
  </div>

  <script>
    document.getElementById('btn-entrar').addEventListener('click', function () {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();

      if (!email || !senha) {
        this.classList.add('shake');
        setTimeout(() => this.classList.remove('shake'), 500);
        return;
      }

      this.disabled = true;
      this.innerHTML = '<span class="spinner"></span>';
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    });
  </script>

</body>
</html>
